<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 經典遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&display=swap');
        
        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            touch-action: none; /* 防止行動裝置滑動時螢幕跟著滾動 */
        }

        .game-container {
            background-color: #bbada0;
            border-radius: 6px;
            padding: 10px;
            position: relative;
            touch-action: none;
        }

        .grid-cell {
            background-color: #cdc1b4;
            border-radius: 3px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 3px;
            transition: 100ms ease-in-out;
            animation: appear 200ms ease-in-out;
        }

        .tile-merged {
            animation: pop 200ms ease-in-out;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 方塊顏色樣式 */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 45px; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.2381), inset 0 0 0 1px rgba(255, 255, 255, 0.14286); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 45px; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.31746), inset 0 0 0 1px rgba(255, 255, 255, 0.19048); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 45px; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.39683), inset 0 0 0 1px rgba(255, 255, 255, 0.2381); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 35px; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.47619), inset 0 0 0 1px rgba(255, 255, 255, 0.28571); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 35px; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.55556), inset 0 0 0 1px rgba(255, 255, 255, 0.33333); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 30px; }

        .overlay {
            background: rgba(238, 228, 218, 0.73);
            z-index: 10;
            display: none;
            animation: fade-in 800ms ease;
        }
        
        .overlay.active {
            display: flex;
        }

        @keyframes fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-lg p-4">
        <!-- 頭部資訊 -->
        <div class="flex justify-between items-start mb-6">
            <h1 class="text-6xl font-bold text-[#776e65]">2048</h1>
            <div class="flex space-x-2">
                <div class="bg-[#bbada0] rounded text-center px-4 py-1">
                    <div class="text-[#eee4da] text-xs font-bold uppercase">時間</div>
                    <div id="timer" class="text-white font-bold text-xl">00:00</div>
                </div>
                <div class="bg-[#bbada0] rounded text-center px-4 py-1">
                    <div class="text-[#eee4da] text-xs font-bold uppercase">分數</div>
                    <div id="score" class="text-white font-bold text-xl">0</div>
                </div>
                <div class="bg-[#bbada0] rounded text-center px-4 py-1">
                    <div class="text-[#eee4da] text-xs font-bold uppercase">最高分</div>
                    <div id="best-score" class="text-white font-bold text-xl">0</div>
                </div>
            </div>
        </div>

        <!-- 遊戲說明與控制 -->
        <div class="flex justify-between items-center mb-6">
            <p class="text-sm md:text-base leading-relaxed">
                合併相同數字，獲得 <span class="font-bold">2048</span> 方塊！<br>
                <span class="text-gray-500 text-xs">可使用 <b>方向鍵</b> 或 <b>滑動螢幕</b> 操作。</span>
            </p>
            <button id="restart-btn" class="bg-[#8f7a66] hover:bg-[#9f8b77] text-white font-bold py-2 px-5 rounded transition-colors whitespace-nowrap">
                新遊戲
            </button>
        </div>

        <!-- 遊戲棋盤 -->
        <div id="game-board-container" class="game-container w-full aspect-square mx-auto relative">
            <!-- 背景網格 -->
            <div class="grid grid-cols-4 grid-rows-4 gap-[10px] w-full h-full p-[10px] absolute inset-0">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <!-- 動態方塊層 -->
            <div id="tiles-layer" class="absolute inset-0 p-[10px]"></div>

            <!-- 結束/獲勝覆蓋層 -->
            <div id="game-message" class="overlay absolute inset-0 flex-col justify-center items-center rounded-[6px]">
                <h2 id="message-text" class="text-5xl font-bold text-[#776e65] mb-4">遊戲結束!</h2>
                <button id="retry-btn" class="bg-[#8f7a66] hover:bg-[#9f8b77] text-white font-bold py-3 px-6 rounded mt-4">
                    再試一次
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 遊戲狀態與常數 ---
        const SIZE = 4;
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048-best-score') || 0;
        let hasWon = false;
        let isGameOver = false;
        let keepPlaying = false;

        // --- 音效系統 (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playMergeSound() {
            if (!audioCtx) return;
            
            // 建立振盪器與音量控制節點
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // 設定音色為正弦波 (最純淨圓潤的聲音)
            osc.type = 'sine';
            
            // 頻率滑動：從 800Hz 快速滑動到 1200Hz 產生清脆的「啵」聲
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
            
            // 音量包絡：瞬間發聲後快速衰減
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            // 連接節點並播放
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        let startTime = null;
        let timerInterval = null;
        let elapsedTime = 0;

        const tilesLayer = document.getElementById('tiles-layer');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const timerEl = document.getElementById('timer');
        const messageEl = document.getElementById('game-message');
        const messageTextEl = document.getElementById('message-text');

        bestScoreEl.textContent = bestScore;

        // --- 計時器邏輯 ---
        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                timerEl.textContent = formatTime(elapsedTime);
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // --- 初始化遊戲 ---
        function initGame() {
            board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            score = 0;
            hasWon = false;
            isGameOver = false;
            keepPlaying = false;
            updateScore();
            messageEl.classList.remove('active');
            
            // 重置並啟動計時器
            stopTimer();
            elapsedTime = 0;
            timerEl.textContent = "00:00";
            startTimer();

            // 初始產生兩個方塊
            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        // --- 核心邏輯：加入隨機方塊 ---
        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) emptyCells.push({ r, c });
                }
            }

            if (emptyCells.length > 0) {
                let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // --- 核心邏輯：渲染畫面 ---
        function renderBoard() {
            tilesLayer.innerHTML = '';
            
            // 計算容器大小以動態設定方塊位置
            const container = document.getElementById('game-board-container');
            // 減去 padding (10px * 2)
            const availableSize = container.offsetWidth - 20; 
            const gap = 10;
            const tileSize = (availableSize - gap * 3) / 4;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    let val = board[r][c];
                    if (val !== 0) {
                        let tile = document.createElement('div');
                        let tileClass = val <= 2048 ? `tile-${val}` : 'tile-super';
                        
                        // 動態計算位置
                        const top = r * (tileSize + gap);
                        const left = c * (tileSize + gap);
                        
                        tile.className = `tile ${tileClass} text-2xl md:text-4xl`;
                        tile.style.width = `${tileSize}px`;
                        tile.style.height = `${tileSize}px`;
                        tile.style.top = `${top}px`;
                        tile.style.left = `${left}px`;
                        tile.textContent = val;
                        
                        tilesLayer.appendChild(tile);
                    }
                }
            }
        }

        // --- 核心邏輯：單行滑動與合併 ---
        function slideAndMergeRow(row) {
            // 1. 移除 0
            let newRow = row.filter(val => val !== 0);
            
            // 2. 合併相鄰相同數字
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] !== 0 && newRow[i] === newRow[i + 1]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow[i + 1] = 0;
                    
                    if (newRow[i] === 2048 && !hasWon) {
                        hasWon = true;
                    }
                }
            }
            
            // 3. 再次移除 0 並補齊長度
            newRow = newRow.filter(val => val !== 0);
            while (newRow.length < SIZE) {
                newRow.push(0);
            }
            
            return newRow;
        }

        // --- 矩陣操作輔助函數 ---
        // 旋轉矩陣 (用於復用向左滑動的邏輯)
        function rotateLeft(matrix) {
            const newMatrix = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    newMatrix[SIZE - 1 - c][r] = matrix[r][c];
                }
            }
            return newMatrix;
        }

        function rotateRight(matrix) {
            const newMatrix = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    newMatrix[c][SIZE - 1 - r] = matrix[r][c];
                }
            }
            return newMatrix;
        }

        function flipHorizontally(matrix) {
            return matrix.map(row => [...row].reverse());
        }

        // --- 移動處理 ---
        // 統一以向左移動為基準，其他方向透過矩陣變換實現
        function moveLeft() {
            let changed = false;
            for (let r = 0; r < SIZE; r++) {
                let oldRow = [...board[r]];
                board[r] = slideAndMergeRow(board[r]);
                if (oldRow.join(',') !== board[r].join(',')) {
                    changed = true;
                }
            }
            return changed;
        }

        function move(direction) {
            if (isGameOver) return;
            
            let changed = false;
            let tempBoard = [...board];
            let oldScore = score; // 紀錄移動前的分數

            switch(direction) {
                case 'ArrowLeft':
                    changed = moveLeft();
                    break;
                case 'ArrowRight':
                    board = flipHorizontally(board);
                    changed = moveLeft();
                    board = flipHorizontally(board);
                    break;
                case 'ArrowUp':
                    board = rotateLeft(board);
                    changed = moveLeft();
                    board = rotateRight(board);
                    break;
                case 'ArrowDown':
                    board = rotateRight(board);
                    changed = moveLeft();
                    board = rotateLeft(board);
                    break;
            }

            if (changed) {
                if (score > oldScore) {
                    playMergeSound(); // 若分數增加，代表發生了合併，播放音效
                }
                addRandomTile();
                updateScore();
                renderBoard();
                checkGameStatus();
            }
        }

        // --- 狀態更新與判定 ---
        function updateScore() {
            scoreEl.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreEl.textContent = bestScore;
                localStorage.setItem('2048-best-score', bestScore);
            }
        }

        function checkGameStatus() {
            if (hasWon && !keepPlaying) {
                stopTimer();
                showOverlay("你贏了!");
                // 允許玩家繼續玩
                const retryBtn = document.getElementById('retry-btn');
                retryBtn.textContent = "繼續遊戲";
                retryBtn.onclick = () => {
                    keepPlaying = true;
                    messageEl.classList.remove('active');
                    retryBtn.textContent = "再試一次";
                    startTimer(); // 恢復計時
                    retryBtn.onclick = initGame;
                };
                return;
            }

            let canMove = false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) {
                        canMove = true;
                        break;
                    }
                    if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) canMove = true;
                    if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) canMove = true;
                }
                if (canMove) break;
            }

            if (!canMove) {
                isGameOver = true;
                stopTimer();
                showOverlay("遊戲結束!");
            }
        }

        function showOverlay(msg) {
            messageTextEl.textContent = msg;
            messageEl.classList.add('active');
        }

        // --- 事件監聽器 ---
        document.addEventListener('keydown', (e) => {
            initAudio(); // 初始化音效解鎖瀏覽器限制
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); // 防止方向鍵滾動網頁
                move(e.key);
            } else if (['w', 'a', 's', 'd'].includes(e.key.toLowerCase())) {
                const map = { 'w': 'ArrowUp', 's': 'ArrowDown', 'a': 'ArrowLeft', 'd': 'ArrowRight' };
                move(map[e.key.toLowerCase()]);
            }
        });

        // 觸控滑動支援 (行動裝置)
        let touchStartX = 0;
        let touchStartY = 0;
        const container = document.getElementById('game-board-container');

        container.addEventListener('touchstart', (e) => {
            initAudio(); // 初始化音效解鎖瀏覽器限制
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});

        container.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 防止滾動
        }, {passive: false});

        container.addEventListener('touchend', (e) => {
            if (isGameOver) return;
            
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            let absDx = Math.abs(dx);
            let absDy = Math.abs(dy);
            
            // 確保滑動距離夠大，避免誤觸
            if (Math.max(absDx, absDy) > 30) {
                if (absDx > absDy) {
                    // 水平滑動
                    move(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
                } else {
                    // 垂直滑動
                    move(dy > 0 ? 'ArrowDown' : 'ArrowUp');
                }
            }
        });

        // 按鈕監聽
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('retry-btn').addEventListener('click', initGame);

        // 視窗縮放時重新渲染以調整方塊大小
        window.addEventListener('resize', renderBoard);

        // 啟動遊戲
        initGame();
    </script>
</body>
</html>
